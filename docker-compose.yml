version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: ai_chat_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ai_chat_analytics
      POSTGRES_USER: analytics_user
      POSTGRES_PASSWORD: analytics_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: